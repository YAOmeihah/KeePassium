name: Build latest Feather-compatible KeePassium Pro

on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show build environment
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          sw_vers
          uname -m
          xcode-select -p
          xcodebuild -version
          test -f KeePassium/remote-files/webdav/WebDAVProvider.swift
          rg -q 'FEATHER_COMPAT' KeePassiumLib/KeePassiumLib/util/AppGroup.swift

      - name: Inspect Xcode projects
        run: |
          set -o pipefail
          rm -f KeePassiumLib/KeePassiumLib.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
          xcodebuild -project KeePassiumLib/KeePassiumLib.xcodeproj -list \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            | tee "$RUNNER_TEMP/keepassiumlib-project.txt"
          xcodebuild -project KeePassium.xcodeproj -list \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            | tee "$RUNNER_TEMP/keepassium-project.txt"

      - name: Build KeePassiumLib with Feather compatibility
        run: |
          set -o pipefail
          xcodebuild \
            -project KeePassiumLib/KeePassiumLib.xcodeproj \
            -target KeePassiumLib \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            SYMROOT="$RUNNER_TEMP/Build" \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS="FEATHER_COMPAT" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build | tee "$RUNNER_TEMP/keepassiumlib-build.log"

      - name: Build KeePassium Pro without signing
        run: |
          set -o pipefail
          xcodebuild \
            -project KeePassium.xcodeproj \
            -target "KeePassium Pro" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            SYMROOT="$RUNNER_TEMP/Build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build | tee "$RUNNER_TEMP/keepassium-pro-build.log"

      - name: Package Feather-compatible IPA
        run: |
          set -euo pipefail

          app_path=$(find "$RUNNER_TEMP/Build" -type d -name 'KeePassium Pro.app' -print -quit)
          test -n "$app_path"
          test -f "$app_path/KeePassium Pro"
          test -d "$app_path/Frameworks/KeePassiumLib.framework"

          version=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app_path/Info.plist")
          build=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$app_path/Info.plist")
          bundle_id=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app_path/Info.plist")
          test "$bundle_id" = "com.keepassium.ios.pro"

          printf 'Source commit: %s\nApp version: %s (%s)\nBundle ID: %s\nBuild mode: FEATHER_COMPAT (no AutoFill extension)\n' \
            "$(git rev-parse HEAD)" "$version" "$build" "$bundle_id" \
            | tee "$RUNNER_TEMP/build-info.txt"

          ipa_root="$RUNNER_TEMP/ipa-feather-compat"
          mkdir -p "$ipa_root/Payload"
          ditto "$app_path" "$ipa_root/Payload/KeePassium Pro.app"
          rm -rf "$ipa_root/Payload/KeePassium Pro.app/PlugIns"
          test ! -d "$ipa_root/Payload/KeePassium Pro.app/PlugIns"

          ipa_path="$RUNNER_TEMP/KeePassiumPro-${version}-${build}-feather-compat-no-autofill.ipa"
          ditto -c -k --sequesterRsrc --keepParent \
            "$ipa_root/Payload" "$ipa_path"

          find "$app_path" -maxdepth 4 -print | sort > "$RUNNER_TEMP/full-app-files.txt"
          shasum -a 256 "$ipa_path" | tee "$RUNNER_TEMP/SHA256SUMS.txt"

      - name: Upload Feather-compatible IPA
        uses: actions/upload-artifact@v4
        with:
          name: KeePassiumPro-feather-compat-${{ github.run_number }}
          path: |
            ${{ runner.temp }}/KeePassiumPro-*-feather-compat-no-autofill.ipa
            ${{ runner.temp }}/SHA256SUMS.txt
            ${{ runner.temp }}/build-info.txt
            ${{ runner.temp }}/full-app-files.txt
            ${{ runner.temp }}/*-project.txt
            ${{ runner.temp }}/*-build.log
          if-no-files-found: error
          retention-days: 30
